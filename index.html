<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FaceSwap — AI Face Swap Video Creator</title>
  <meta name="description" content="Create viral face-swap videos for TikTok, Reels and Shorts. Upload your selfie, pick a template, share in minutes." />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #0b0b0f 0%, #1a0b2a 100%);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      text-align: center;
    }
    main { max-width: 540px; }
    h1 { font-size: 2.2rem; margin: 0 0 12px; }
    .accent { color: #9333EA; }
    p.lead { color: #cfcfd6; font-size: 1.05rem; }
    .btn-row { display: flex; gap: 10px; justify-content: center; margin-top: 28px; flex-wrap: wrap; }
    a.btn {
      display: inline-block; padding: 14px 22px; border-radius: 999px;
      text-decoration: none; font-weight: 600;
    }
    a.btn.primary { background: #9333EA; color: #fff; }
    a.btn.secondary { background: #fff; color: #0b0b0f; }
    footer { margin-top: 40px; font-size: 0.8rem; color: #888; }
    footer a { color: #aaa; }
  </style>
</head>
<body>
  <main>
    <h1>FaceSwap <span class="accent">AI</span></h1>
    <p class="lead">
      Create viral face-swap videos for TikTok, Reels and Shorts.<br/>
      Upload your selfie, pick a template, share in minutes.
    </p>
    <div class="btn-row">
      <a class="btn primary" href="https://apps.apple.com">App Store</a>
      <a class="btn secondary" href="https://play.google.com/store/apps/details?id=com.oguzcc.face.swap">Google Play</a>
    </div>
    <footer>
      <a href="https://github.com/oguzcc/face-swap-app">GitHub</a>
    </footer>
  </main>
</body>
</html>
